global
    maxconn 4096

defaults
    mode tcp
    timeout connect 5s
    timeout client 1m
    timeout server 1m

frontend amqp_frontend
    bind *:5672
    default_backend amqp_backend

backend amqp_backend
    balance roundrobin
    option tcp-check
    server rabbitmq-1 rabbitmq-1:5672 check inter 5s fall 3 rise 2
    server rabbitmq-2 rabbitmq-2:5672 check inter 5s fall 3 rise 2
    server rabbitmq-3 rabbitmq-3:5672 check inter 5s fall 3 rise 2
